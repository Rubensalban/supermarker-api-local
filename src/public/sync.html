<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>API-LOCAL — Synchronisation manuelle</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<script>
  tailwind.config = {
    theme: {
      extend: {
        fontFamily: {
          sans: ['Inter', 'ui-sans-serif', 'system-ui'],
          mono: ['JetBrains Mono', 'ui-monospace', 'monospace'],
        },
      },
    },
  };
</script>
<style>
  body { font-family: 'Inter', system-ui, sans-serif; }
  pre { font-family: 'JetBrains Mono', ui-monospace, monospace; }
  .pulse-dot {
    animation: pulse-dot 1s ease-in-out infinite;
  }
  @keyframes pulse-dot {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.35; }
  }
</style>
</head>
<body class="bg-slate-950 text-slate-100 min-h-screen antialiased">

<header class="border-b border-slate-800 bg-slate-900/60 backdrop-blur sticky top-0 z-10">
  <div class="max-w-6xl mx-auto px-6 py-4 flex items-center justify-between gap-4 flex-wrap">
    <div>
      <h1 class="text-base font-semibold tracking-tight">API-LOCAL — Synchronisation</h1>
      <p class="text-xs text-slate-400 mt-0.5" id="hostMeta"></p>
    </div>
    <div class="flex items-center gap-2 text-xs">
      <span id="keyState" class="px-2 py-1 rounded-md bg-slate-800 border border-slate-700 text-slate-300">Clé : chargement…</span>
      <span id="connState" class="px-2 py-1 rounded-md bg-slate-800 border border-slate-700 text-slate-300">Connexion : —</span>
    </div>
  </div>
</header>

<main class="max-w-6xl mx-auto px-6 py-8 space-y-8">

  <!-- Actions principales -->
  <section>
    <h2 class="text-xs font-semibold uppercase tracking-wider text-slate-400 mb-3">Synchronisation</h2>
    <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-3">
      <button data-method="POST" data-path="/api/sync/all" class="action group rounded-lg border border-blue-500/40 bg-blue-500/10 hover:bg-blue-500/20 hover:border-blue-400 transition px-4 py-3 text-left">
        <div class="text-sm font-semibold text-blue-300">Sync incrémentale</div>
        <div class="text-xs text-slate-400 mt-0.5">Toutes les entités, depuis le dernier watermark</div>
      </button>
      <button data-method="POST" data-path="/api/sync/full" class="action group rounded-lg border border-indigo-500/40 bg-indigo-500/10 hover:bg-indigo-500/20 hover:border-indigo-400 transition px-4 py-3 text-left">
        <div class="text-sm font-semibold text-indigo-300">Sync FULL</div>
        <div class="text-xs text-slate-400 mt-0.5">Avec détection des suppressions (soft-delete)</div>
      </button>
      <button data-method="POST" data-path="/api/sync/clients" class="action rounded-lg border border-slate-700 bg-slate-900 hover:bg-slate-800 hover:border-slate-500 transition px-4 py-3 text-left">
        <div class="text-sm font-medium">Clients seuls</div>
        <div class="text-xs text-slate-500 mt-0.5">F_COMPTET — commerciaux uniquement</div>
      </button>
      <button data-method="POST" data-path="/api/sync/articles" class="action rounded-lg border border-slate-700 bg-slate-900 hover:bg-slate-800 hover:border-slate-500 transition px-4 py-3 text-left">
        <div class="text-sm font-medium">Articles seuls</div>
        <div class="text-xs text-slate-500 mt-0.5">F_ARTICLE</div>
      </button>
      <button data-method="POST" data-path="/api/sync/factures" class="action rounded-lg border border-slate-700 bg-slate-900 hover:bg-slate-800 hover:border-slate-500 transition px-4 py-3 text-left">
        <div class="text-sm font-medium">Factures seules</div>
        <div class="text-xs text-slate-500 mt-0.5">F_DOCENTETE — commerciaux uniquement</div>
      </button>
      <button data-method="POST" data-path="/api/sync/reglements" class="action rounded-lg border border-slate-700 bg-slate-900 hover:bg-slate-800 hover:border-slate-500 transition px-4 py-3 text-left">
        <div class="text-sm font-medium">Règlements seuls</div>
        <div class="text-xs text-slate-500 mt-0.5">F_CREGLEMENT — commerciaux uniquement</div>
      </button>
    </div>
  </section>

  <!-- Vérifications -->
  <section>
    <h2 class="text-xs font-semibold uppercase tracking-wider text-slate-400 mb-3">Vérifications</h2>
    <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-3">
      <button data-method="GET" data-path="/api/sync/logs" class="action rounded-lg border border-slate-700 bg-slate-900 hover:bg-slate-800 hover:border-slate-500 transition px-4 py-3 text-left">
        <div class="text-sm font-medium">Logs metadata</div>
        <div class="text-xs text-slate-500 mt-0.5">last_sync_at par entité</div>
      </button>
      <button data-method="GET" data-path="/api/status" class="action rounded-lg border border-slate-700 bg-slate-900 hover:bg-slate-800 hover:border-slate-500 transition px-4 py-3 text-left">
        <div class="text-sm font-medium">Status global</div>
        <div class="text-xs text-slate-500 mt-0.5">Vue d'ensemble</div>
      </button>
      <button data-method="GET" data-path="/api/status/connections" class="action rounded-lg border border-slate-700 bg-slate-900 hover:bg-slate-800 hover:border-slate-500 transition px-4 py-3 text-left">
        <div class="text-sm font-medium">Connexions</div>
        <div class="text-xs text-slate-500 mt-0.5">SQL Server &amp; VPS</div>
      </button>
      <button data-method="GET" data-path="/api/status/queue" class="action rounded-lg border border-slate-700 bg-slate-900 hover:bg-slate-800 hover:border-slate-500 transition px-4 py-3 text-left">
        <div class="text-sm font-medium">Queue stats</div>
        <div class="text-xs text-slate-500 mt-0.5">Pending / Failed / Done</div>
      </button>
    </div>
  </section>

  <!-- Maintenance -->
  <section>
    <h2 class="text-xs font-semibold uppercase tracking-wider text-slate-400 mb-3">Maintenance</h2>
    <div class="grid grid-cols-2 sm:grid-cols-4 gap-3">
      <button data-method="POST" data-path="/api/sync/pause" class="action rounded-lg border border-amber-500/40 bg-amber-500/10 hover:bg-amber-500/20 transition px-4 py-3 text-left">
        <div class="text-sm font-medium text-amber-300">Pause cron</div>
      </button>
      <button data-method="POST" data-path="/api/sync/resume" class="action rounded-lg border border-emerald-500/40 bg-emerald-500/10 hover:bg-emerald-500/20 transition px-4 py-3 text-left">
        <div class="text-sm font-medium text-emerald-300">Reprendre cron</div>
      </button>
      <button data-method="POST" data-path="/api/queue/retry" class="action rounded-lg border border-slate-700 bg-slate-900 hover:bg-slate-800 hover:border-slate-500 transition px-4 py-3 text-left">
        <div class="text-sm font-medium">Retry FAILED</div>
      </button>
      <button data-method="DELETE" data-path="/api/queue/purge" class="action rounded-lg border border-rose-500/40 bg-rose-500/10 hover:bg-rose-500/20 transition px-4 py-3 text-left">
        <div class="text-sm font-medium text-rose-300">Purge DONE</div>
      </button>
    </div>
  </section>

  <!-- Résultat -->
  <section>
    <div class="rounded-xl border border-slate-800 bg-slate-900/60 overflow-hidden shadow-lg">
      <div class="flex items-center justify-between px-5 py-3 border-b border-slate-800 bg-slate-900">
        <div class="flex items-center gap-3">
          <h3 class="text-sm font-semibold text-slate-200" id="resultLabel">Résultat</h3>
          <span id="resultStatus" class="hidden text-xs px-2 py-0.5 rounded-md font-medium"></span>
        </div>
        <div class="flex items-center gap-3">
          <span id="resultMeta" class="text-xs text-slate-500"></span>
          <span id="resultTimer" class="text-xs text-slate-400 tabular-nums"></span>
          <button id="copyBtn" class="text-xs px-2.5 py-1 rounded-md border border-slate-700 hover:border-slate-500 hover:bg-slate-800 transition text-slate-300">Copier</button>
        </div>
      </div>
      <pre id="resultBody" class="p-5 text-[12.5px] leading-relaxed text-slate-300 overflow-auto max-h-[60vh] whitespace-pre-wrap break-words">// Cliquez sur une action pour voir le résultat ici.</pre>
    </div>
  </section>

</main>

<script>
(() => {
  const $ = (id) => document.getElementById(id);
  let apiKey = '';

  $('hostMeta').textContent = location.host + ' · ' + new Date().toLocaleString();

  function setKeyState(ok) {
    const el = $('keyState');
    if (ok) {
      el.textContent = 'Clé : chargée';
      el.className = 'px-2 py-1 rounded-md bg-emerald-500/10 border border-emerald-500/40 text-emerald-300';
    } else {
      el.textContent = 'Clé : indisponible';
      el.className = 'px-2 py-1 rounded-md bg-rose-500/10 border border-rose-500/40 text-rose-300';
    }
  }

  async function loadKey() {
    try {
      const res = await fetch('/ui/config');
      if (!res.ok) throw new Error('HTTP ' + res.status);
      const data = await res.json();
      apiKey = data.apiKey || '';
      setKeyState(!!apiKey);
    } catch (err) {
      setKeyState(false);
      $('resultBody').textContent = 'Impossible de charger la clé API depuis /ui/config : ' + err.message
        + '\n\nL\'endpoint n\'est accessible que depuis localhost / réseau privé.';
    }
  }

  function setStatus(state, text) {
    const el = $('resultStatus');
    el.textContent = text;
    el.classList.remove('hidden', 'bg-emerald-500/15', 'text-emerald-300', 'bg-rose-500/15', 'text-rose-300', 'bg-blue-500/15', 'text-blue-300');
    if (state === 'ok')  el.classList.add('bg-emerald-500/15', 'text-emerald-300');
    if (state === 'err') el.classList.add('bg-rose-500/15', 'text-rose-300');
    if (state === 'run') el.classList.add('bg-blue-500/15', 'text-blue-300');
  }

  async function checkConnection() {
    if (!apiKey) return;
    try {
      const res = await fetch('/api/status/connections', { headers: { 'x-api-key': apiKey } });
      const data = await res.json();
      const sql = data.sqlServer || data.sql_server;
      const vps = data.vps;
      const el = $('connState');
      const sqlOk = sql === true || (sql && sql.up);
      const vpsOk = vps === true || (vps && vps.up);
      el.innerHTML = 'SQL : <span class="' + (sqlOk ? 'text-emerald-400' : 'text-rose-400') + '">'
        + (sqlOk ? 'OK' : 'KO') + '</span> · VPS : <span class="'
        + (vpsOk ? 'text-emerald-400' : 'text-rose-400') + '">' + (vpsOk ? 'OK' : 'KO') + '</span>';
      el.className = 'px-2 py-1 rounded-md bg-slate-800 border border-slate-700 text-slate-300';
    } catch {
      $('connState').textContent = 'Connexion : indisponible';
    }
  }

  async function run(button) {
    if (!apiKey) {
      setStatus('err', 'Clé manquante');
      $('resultBody').textContent = 'Clé API non chargée. Recharge la page.';
      return;
    }

    const path = button.dataset.path;
    const method = button.dataset.method;
    const label = button.querySelector('.text-sm').textContent.trim();

    document.querySelectorAll('button.action').forEach(b => b.disabled = true);
    document.querySelectorAll('button.action').forEach(b => b.classList.add('opacity-50', 'pointer-events-none'));

    setStatus('run', 'En cours');
    $('resultLabel').innerHTML = '<span class="inline-block w-2 h-2 rounded-full bg-blue-400 mr-2 pulse-dot align-middle"></span>' + label;
    $('resultBody').className = 'p-5 text-[12.5px] leading-relaxed text-slate-300 overflow-auto max-h-[60vh] whitespace-pre-wrap break-words';
    $('resultBody').textContent = '// Requête en cours… (un FULL peut prendre plusieurs minutes)';
    $('resultMeta').textContent = method + ' ' + path;
    $('resultTimer').textContent = '0.0s';

    const start = performance.now();
    const ticker = setInterval(() => {
      $('resultTimer').textContent = ((performance.now() - start) / 1000).toFixed(1) + 's';
    }, 100);

    try {
      const res = await fetch(path, {
        method,
        headers: { 'x-api-key': apiKey, 'Content-Type': 'application/json' },
      });

      const ct = res.headers.get('content-type') || '';
      const body = ct.includes('application/json') ? await res.json() : await res.text();

      clearInterval(ticker);
      $('resultTimer').textContent = ((performance.now() - start) / 1000).toFixed(2) + 's';
      $('resultLabel').textContent = label;

      if (res.ok) {
        setStatus('ok', 'HTTP ' + res.status);
      } else {
        setStatus('err', 'HTTP ' + res.status);
        $('resultBody').classList.add('text-rose-300');
      }

      $('resultBody').textContent = typeof body === 'string' ? body : JSON.stringify(body, null, 2);
    } catch (err) {
      clearInterval(ticker);
      $('resultTimer').textContent = ((performance.now() - start) / 1000).toFixed(2) + 's';
      setStatus('err', 'Erreur réseau');
      $('resultBody').classList.add('text-rose-300');
      $('resultBody').textContent = 'Erreur réseau : ' + err.message
        + '\n\nL\'API-LOCAL est-elle bien démarrée sur le port ' + location.port + ' ?';
    } finally {
      document.querySelectorAll('button.action').forEach(b => {
        b.disabled = false;
        b.classList.remove('opacity-50', 'pointer-events-none');
      });
      checkConnection();
    }
  }

  document.querySelectorAll('button.action').forEach(btn => {
    btn.addEventListener('click', () => run(btn));
  });

  $('copyBtn').addEventListener('click', async () => {
    try {
      await navigator.clipboard.writeText($('resultBody').textContent);
      const prev = $('copyBtn').textContent;
      $('copyBtn').textContent = 'Copié';
      setTimeout(() => { $('copyBtn').textContent = prev; }, 1200);
    } catch {}
  });

  loadKey().then(checkConnection);
  setInterval(checkConnection, 30000);
})();
</script>
</body>
</html>
