services:
  api-local:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: api-local
    restart: unless-stopped
    ports:
      - "3500:3500"
    env_file:
      - .env
    user: "${API_UID:-1000}:${API_GID:-1000}"
    volumes:
      - api-data:/app/data
      - ./logs:/app/logs:z
    networks:
      - monitoring
    extra_hosts:
      - "host.docker.internal:host-gateway"

  loki:
    image: grafana/loki:3.0.0
    container_name: loki
    restart: unless-stopped
    ports:
      - "3100:3100"
    volumes:
      - ./monitoring/loki/loki-config.yml:/etc/loki/local-config.yaml
      - loki-data:/loki
    command: -config.file=/etc/loki/local-config.yaml
    networks:
      - monitoring
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3100/ready"]
      interval: 15s
      timeout: 5s
      retries: 3

  promtail:
    image: grafana/promtail:3.0.0
    container_name: promtail
    restart: unless-stopped
    volumes:
      - ./monitoring/promtail/promtail-config.yml:/etc/promtail/config.yml
      - ./logs:/var/log/api-local:ro
    command: -config.file=/etc/promtail/config.yml
    networks:
      - monitoring
    depends_on:
      - loki
      - api-local

  prometheus:
    build:
      context: ./monitoring/prometheus
    container_name: prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.retention.time=30d'
      - '--web.enable-lifecycle'
    networks:
      - monitoring
    depends_on:
      - api-local

  grafana:
    build:
      context: ./monitoring/grafana
    container_name: grafana
    restart: unless-stopped
    ports:
      - "4500:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-admin}
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_SERVER_ROOT_URL=http://localhost:4500/
      - GF_RENDERING_SERVER_URL=http://grafana-image-renderer:8081/render
      - GF_RENDERING_CALLBACK_URL=http://grafana:3000/
      - GF_RENDERING_RENDERER_TOKEN=${GRAFANA_RENDERER_TOKEN:?GRAFANA_RENDERER_TOKEN required}
      - GF_LOG_FILTERS=rendering:debug
    volumes:
      - grafana-data:/var/lib/grafana
    networks:
      - monitoring
    depends_on:
      - prometheus
      - loki
      - grafana-image-renderer

  grafana-image-renderer:
    image: grafana/grafana-image-renderer:latest
    container_name: grafana-image-renderer
    restart: unless-stopped
    environment:
      - ENABLE_METRICS=true
      # Doit etre identique a GF_RENDERING_RENDERER_TOKEN cote grafana
      - AUTH_TOKEN=${GRAFANA_RENDERER_TOKEN:?GRAFANA_RENDERER_TOKEN required}
    networks:
      - monitoring

volumes:
  api-data:
  prometheus-data:
  grafana-data:
  loki-data:

networks:
  monitoring:
    driver: bridge
